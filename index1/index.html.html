<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاليري ريشة الإبداع | ألوان الغروب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sunset-deep: #1e293b;
            --sunset-purple: #4c1d95;
            --sunset-orange: #f97316;
            --sunset-gold: #fbbf24;
            --bg-canvas: #fdfaf7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            /* إضافة صورة خلفية فنية مطابقة لألوان الغروب في الشعار */
            background: linear-gradient(rgba(253, 250, 247, 0.85), rgba(253, 250, 247, 0.85)), url('https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--sunset-deep), var(--sunset-purple), var(--sunset-orange));
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 8px solid var(--sunset-gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .logo-area {
            font-family: 'Aref Ruqaa', serif;
            font-size: 4rem;
            color: var(--sunset-gold);
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

            .logo-area span {
                color: white;
                font-size: 1.5rem;
                display: block;
                font-family: 'Cairo';
                font-weight: 400;
                opacity: 0.9;
            }

        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .admin-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border: 2px dashed var(--sunset-orange);
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            align-items: end;
        }

        input, select {
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            width: 100%;
        }

            input:focus {
                border-color: var(--sunset-orange);
            }

        .btn-add {
            background: var(--sunset-orange);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

            .btn-add:hover {
                background: var(--sunset-purple);
            }

        .tab-btn {
            padding: 10px 20px;
            border: 2px solid var(--sunset-orange);
            background: rgba(255, 255, 255, 0.7);
            color: var(--sunset-orange);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            margin: 5px;
            backdrop-filter: blur(5px);
        }

            .tab-btn.active {
                background: var(--sunset-orange);
                color: white;
            }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            flex: 3;
        }

        .item-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.4s;
            position: relative;
            border: 1px solid rgba(76, 29, 149, 0.1);
            display: flex;
            flex-direction: column;
        }

            .item-card:hover {
                transform: translateY(-5px);
            }

            .item-card img {
                width: 100%;
                height: 220px;
                object-fit: cover;
            }

        .controls-box {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
        }

        .control-label {
            font-size: 0.75rem;
            color: #64748b;
            display: block;
            margin-bottom: 5px;
            text-align: right;
        }

        .control-btns {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
            margin-top: 8px;
        }

        .btn-sm {
            padding: 7px;
            font-size: 0.75rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        .main-wrapper {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .cart-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            position: sticky;
            top: 20px;
            border: 2px solid var(--sunset-gold);
            min-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 1000px) {
            .main-wrapper {
                flex-direction: column;
            }

            .cart-box {
                position: static;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="promo-banner" style="background: var(--sunset-gold); text-align: center; padding: 10px; font-weight: 800; position: relative; z-index: 10;">🌅 عروض الغروب: خصومات تلقائية تبدأ عند شراء قطعتين فأكثر!</div>

    <header>
        <div class="logo-area">ريشة الإبداع 🎨<span>جمال الفن في كل قطعة</span></div>
    </header>

    <div class="container">
        <section class="admin-panel">
            <h3 style="margin-bottom: 15px; color: var(--sunset-purple);">🖋️ إضافة قطعة فنية جديدة</h3>
            <div class="admin-grid">
                <div><label>تحميل صورة:</label><input type="file" id="inpFile" accept="image/*"></div>
                <div><label>اسم العمل:</label><input type="text" id="inpTitle" placeholder="مثلاً: غروب دجلة"></div>
                <div><label>السعر (د.ع):</label><input type="number" id="inpPrice" placeholder="0"></div>
                <div>
                    <label>اختيار القسم:</label>
                    <select id="inpCat">
                        <option value="kids">أطفال</option>
                        <option value="general">عامة</option>
                        <option value="elders">تراث</option>
                        <option value="tools">أدوات</option>
                    </select>
                </div>
                <button class="btn-add" onclick="addNewProduct()">إضافة للمتجر</button>
            </div>
        </section>

        <div style="text-align: center; margin-bottom: 25px;">
            <button class="tab-btn active" onclick="filterGallery('all', this)">الكل</button>
            <button class="tab-btn" onclick="filterGallery('kids', this)">أطفال</button>
            <button class="tab-btn" onclick="filterGallery('general', this)">عامة</button>
            <button class="tab-btn" onclick="filterGallery('elders', this)">تراث</button>
            <button class="tab-btn" onclick="filterGallery('tools', this)">أدوات</button>
        </div>

        <div class="main-wrapper">
            <main class="gallery-grid" id="mainGrid"></main>

            <aside class="sidebar">
                <div class="cart-box">
                    <h3>🛒 مقتنياتك</h3>
                    <div id="cartList" style="margin: 20px 0;"></div>
                    <div id="cartSummary" class="hidden">
                        <p id="discVol" style="color: green; font-weight: bold; margin-bottom: 10px;"></p>
                        <h4 style="font-size: 1.4rem; border-top: 1px solid #eee; pt-10;">الإجمالي: <span id="finalPrice">0</span> د.ع</h4>
                        <button class="btn-add" style="width: 100%; margin-top: 15px; background: var(--sunset-purple);" onclick="alert('سوف يتم توجيهك لبوابة الدفع قريباً!')">تأكيد الشراء</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('resha_products')) || [];
        let myCart = [];
        let currentFilter = 'all';

        window.onload = () => { renderGallery(); };

        function addNewProduct() {
            const file = document.getElementById('inpFile').files[0];
            const title = document.getElementById('inpTitle').value;
            const price = document.getElementById('inpPrice').value;
            const cat = document.getElementById('inpCat').value;

            if (!file || !title || !price) return alert("يرجى إكمال كافة الحقول!");

            const reader = new FileReader();
            reader.onload = function (e) {
                const newObj = {
                    id: Date.now(),
                    img: e.target.result,
                    title: title,
                    price: parseFloat(price),
                    cat: cat
                };
                products.push(newObj);
                saveAndRender();
                resetInputs();
            }
            reader.readAsDataURL(file);
        }

        function resetInputs() {
            document.getElementById('inpTitle').value = "";
            document.getElementById('inpPrice').value = "";
            document.getElementById('inpFile').value = "";
        }

        function saveAndRender() {
            localStorage.setItem('resha_products', JSON.stringify(products));
            renderGallery(currentFilter);
        }

        function renderGallery(filter = 'all') {
            currentFilter = filter;
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);

            if (filtered.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; padding: 50px; color: #666;'>لا توجد أعمال فنية في هذا القسم حالياً.</p>";
                return;
            }

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                            <button style="position:absolute; top:10px; left:10px; background:#ef4444; color:white; border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; z-index:5; font-weight:bold;" onclick="deleteProduct(${p.id})">×</button>
                            <img src="${p.img}">
                            <div style="padding:15px; text-align:center; flex-grow: 1; display: flex; flex-direction: column;">
                                <h3 style="font-size:1.1rem; margin-bottom: 5px;">${p.title}</h3>
                                <p style="color:var(--sunset-orange); font-weight:900; margin-bottom:12px;">${p.price.toLocaleString()} د.ع</p>

                                <div class="controls-box">
                                    <span class="control-label">الوجهة (للنقل أو النسخ):</span>
                                    <select id="sel-${p.id}" style="font-size:0.8rem; padding:6px; border-radius:6px; background: white;">
                                        <option value="kids" ${p.cat === 'kids' ? 'selected' : ''}>أطفال</option>
                                        <option value="general" ${p.cat === 'general' ? 'selected' : ''}>عامة</option>
                                        <option value="elders" ${p.cat === 'elders' ? 'selected' : ''}>تراث</option>
                                        <option value="tools" ${p.cat === 'tools' ? 'selected' : ''}>أدوات</option>
                                    </select>
                                    <div class="control-btns">
                                        <button class="btn-sm" style="background:#3b82f6;" onclick="editProduct(${p.id})">تعديل</button>
                                        <button class="btn-sm" style="background:#4c1d95;" onclick="moveProduct(${p.id})">نقل</button>
                                        <button class="btn-sm" style="background:#fbbf24; color:#1e293b;" onclick="copyProduct(${p.id})">نسخ</button>
                                    </div>
                                </div>

                                <button class="btn-add" style="font-size:0.9rem; width:100%; margin-top: auto;" onclick="addToCart(${p.id})">🛒 إضافة للسلة</button>
                            </div>`;
                grid.appendChild(card);
            });
        }

        function deleteProduct(id) {
            if (confirm("هل أنت متأكد من حذف هذا العمل الفني نهائياً؟")) {
                products = products.filter(p => p.id !== id);
                saveAndRender();
            }
        }

        function editProduct(id) {
            const index = products.findIndex(p => p.id === id);
            const newTitle = prompt("أدخل الاسم الجديد للعمل:", products[index].title);
            const newPrice = prompt("أدخل السعر الجديد (بالأرقام فقط):", products[index].price);

            if (newTitle !== null && newPrice !== null) {
                products[index].title = newTitle || products[index].title;
                products[index].price = parseFloat(newPrice) || products[index].price;
                saveAndRender();
            }
        }

        function moveProduct(id) {
            const selectElement = document.getElementById(`sel-${id}`);
            const newCat = selectElement.value;
            const categoryText = selectElement.options[selectElement.selectedIndex].text;

            const index = products.findIndex(p => p.id === id);
            if (products[index].cat === newCat) {
                return alert("العمل موجود بالفعل في هذا القسم!");
            }

            products[index].cat = newCat;
            saveAndRender();
            alert(`تم نقل العمل بنجاح إلى قسم "${categoryText}"`);
        }

        function copyProduct(id) {
            const selectElement = document.getElementById(`sel-${id}`);
            const newCat = selectElement.value;
            const categoryText = selectElement.options[selectElement.selectedIndex].text;

            const original = products.find(p => p.id === id);
            const copy = {
                ...original,
                id: Date.now(),
                cat: newCat,
                title: original.title + " (نسخة)"
            };

            products.push(copy);
            saveAndRender();
            alert(`تم إنشاء نسخة جديدة في قسم "${categoryText}"`);
        }

        function filterGallery(category, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGallery(category);
        }

        function addToCart(productId) {
            const prod = products.find(p => p.id === productId);
            myCart.push({ ...prod, cartId: Date.now() });
            renderCart();
        }

        function removeFromCart(cartId) {
            myCart = myCart.filter(item => item.cartId !== cartId);
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cartList');
            const summary = document.getElementById('cartSummary');

            if (myCart.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#94a3b8; padding: 20px;'>السلة فارغة حالياً</p>";
                summary.classList.add('hidden');
                return;
            }

            summary.classList.remove('hidden');
            list.innerHTML = "";
            let total = 0;

            myCart.forEach(item => {
                total += item.price;
                list.innerHTML += `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom:1px solid #f1f5f9; padding-bottom:8px;">
                                <div style="flex-grow: 1;">
                                    <p style="font-size:0.85rem; font-weight:bold;">${item.title}</p>
                                    <p style="font-size:0.75rem; color:var(--sunset-orange);">${item.price.toLocaleString()} د.ع</p>
                                </div>
                                <button onclick="removeFromCart(${item.cartId})" style="border:none; color:#ef4444; background:none; cursor:pointer; font-size: 1.2rem; padding-right: 10px;">🗑️</button>
                            </div>`;
            });

            let discountRate = myCart.length >= 2 ? (myCart.length * 1) + 1 : 0;
            let discountValue = total * (discountRate / 100);
            let final = total - discountValue;

            document.getElementById('discVol').innerText = discountRate > 0 ? `تهانينا! حصلت على خصم ${discountRate}% ✅` : "";
            document.getElementById('finalPrice').innerText = final.toLocaleString();
        }
    </script>
</body>
</html>
